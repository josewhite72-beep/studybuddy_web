<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#4F46E5"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<title>StudyBuddy English</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────── */
:root {
  --fd: 'Baloo 2', cursive;
  --fb: 'Nunito', sans-serif;

  /* Neutral */
  --white: #FFFFFF;
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-400: #9CA3AF;
  --gray-600: #4B5563;
  --gray-800: #1F2937;

  /* Grade palettes */
  --prek-1: #F59E0B; --prek-2: #D97706; --prek-light: #FEF3C7;
  --k-1: #F97316;    --k-2: #EA580C;    --k-light: #FFEDD5;
  --g1-1: #10B981;   --g1-2: #059669;   --g1-light: #D1FAE5;
  --g2-1: #06B6D4;   --g2-2: #0891B2;   --g2-light: #CFFAFE;
  --g3-1: #3B82F6;   --g3-2: #2563EB;   --g3-light: #DBEAFE;
  --g4-1: #4F46E5;   --g4-2: #4338CA;   --g4-light: #E0E7FF;
  --g5-1: #7C3AED;   --g5-2: #6D28D9;   --g5-light: #EDE9FE;
  --g6-1: #9333EA;   --g6-2: #7E22CE;   --g6-light: #F3E8FF;
  --g7-1: #EC4899;   --g7-2: #DB2777;   --g7-light: #FCE7F3;
  --g8-1: #EF4444;   --g8-2: #DC2626;   --g8-light: #FEE2E2;
  --g9-1: #F97316;   --g9-2: #EA580C;   --g9-light: #FFEDD5;
  --g10-1:#D97706;  --g10-2:#B45309;   --g10-light:#FEF3C7;
  --g11-1:#0D9488;  --g11-2:#0F766E;   --g11-light:#CCFBF1;
  --g12-1:#1D4ED8;  --g12-2:#1E3A8A;   --g12-light:#DBEAFE;

  /* UI */
  --accent: #4F46E5;
  --accent-dark: #3730A3;
  --green: #10B981;
  --green-dark: #059669;
  --green-light: #D1FAE5;
  --amber: #F59E0B;
  --red: #EF4444;
  --red-light: #FEE2E2;

  /* Radii & shadows */
  --rsm: 8px; --rmd: 14px; --rlg: 20px; --rxl: 28px;
  --ssm: 0 2px 8px rgba(0,0,0,.08);
  --smd: 0 4px 16px rgba(0,0,0,.12);
  --slg: 0 8px 32px rgba(0,0,0,.16);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html,body { height: 100%; font-family: var(--fb); background: var(--gray-50); color: var(--gray-800); -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
button { font-family: var(--fb); cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: var(--fb); }

/* ── ANIMATIONS ─────────────────────────────────────────────── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes pop    { 0%{transform:scale(.8);opacity:0} 70%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
@keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.6} }
@keyframes shimmer{ 0%{background-position:-200% center} 100%{background-position:200% center} }

/* ── VIEWS ───────────────────────────────────────────────────── */
.view { display:none; flex-direction:column; min-height:100vh; }
.view.active { display:flex; }

/* ── LOADING ─────────────────────────────────────────────────── */
.loading-overlay { position:fixed;inset:0;background:rgba(255,255,255,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999; }
.loading-overlay.show { display:flex; }
.loader { font-size:44px;animation:bounce .8s infinite alternate; }
.loading-text { font-size:16px;font-weight:700;color:var(--gray-600); }

/* ── SPLASH ──────────────────────────────────────────────────── */
#view-splash { align-items:center;justify-content:center;background:linear-gradient(145deg,#4F46E5,#9333EA); }
.splash-logo { font-size:80px;animation:bounce 1s infinite alternate; }
.splash-title { font-family:var(--fd);font-size:38px;color:#fff;font-weight:800;margin-top:14px; }
.splash-sub { color:rgba(255,255,255,.7);font-size:15px;margin-top:6px; }

/* ── HOME / GRADE SELECTOR ───────────────────────────────────── */
#view-home { background:var(--gray-50); }
.home-header { background:linear-gradient(135deg,#4F46E5,#9333EA);padding:28px 20px 24px;text-align:center; }
.home-logo { font-size:42px; }
.home-title { font-family:var(--fd);font-size:28px;font-weight:800;color:#fff;line-height:1.1;margin-top:6px; }
.home-sub { font-size:13px;color:rgba(255,255,255,.8);margin-top:4px; }
.home-body { flex:1;padding:20px 16px 40px;overflow-y:auto; }
.home-section { font-family:var(--fd);font-size:18px;font-weight:800;color:var(--gray-800);margin-bottom:14px; }
.grade-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px; }
.grade-card { border-radius:var(--rlg);padding:18px 14px;cursor:pointer;border:none;text-align:left;transition:transform .15s,box-shadow .15s;box-shadow:var(--ssm); }
.grade-card:active { transform:scale(.97); }
.grade-card.wide { grid-column:1/-1; }
.gc-emoji { font-size:28px;margin-bottom:6px; }
.gc-grade { font-family:var(--fd);font-size:17px;font-weight:800;line-height:1.1; }
.gc-level { font-size:11px;font-weight:700;opacity:.75;margin-top:2px;text-transform:uppercase;letter-spacing:.04em; }
.gc-scenarios { font-size:11px;font-weight:600;margin-top:4px;opacity:.7; }

/* ── GRADE DASHBOARD ──────────────────────────────────────────── */
#view-grade { background:var(--gray-50); }
.grade-header { padding:20px;display:flex;align-items:center;gap:12px;box-shadow:var(--smd);flex-shrink:0; }
.btn-back-home { font-size:22px;background:rgba(255,255,255,.25);border-radius:10px;padding:4px 10px;color:#fff;font-weight:700; }
.grade-header-info { flex:1; }
.grade-header-title { font-family:var(--fd);font-size:20px;font-weight:800;color:#fff;line-height:1.1; }
.grade-header-sub { font-size:12px;color:rgba(255,255,255,.75);font-weight:600;margin-top:2px; }
.grade-body { flex:1;padding:20px 16px 32px;overflow-y:auto; }
.scenario-list { display:flex;flex-direction:column;gap:12px; }

/* Scenario cards */
.scenario-card { background:#fff;border-radius:var(--rlg);box-shadow:var(--ssm);overflow:hidden;border:2px solid transparent;transition:border-color .2s; }
.scenario-card.accessible { cursor:pointer; }
.scenario-card.locked { opacity:.55;background:var(--gray-100); }
.sc-header { padding:16px;display:flex;align-items:center;gap:12px; }
.sc-num { width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;color:#fff; }
.scenario-card.locked .sc-num { background:var(--gray-400)!important; }
.sc-info { flex:1;min-width:0; }
.sc-title { font-size:15px;font-weight:800;color:var(--gray-800);line-height:1.2; }
.sc-themes { font-size:11px;color:var(--gray-400);font-weight:600;margin-top:2px; }
.sc-progress-row { display:flex;align-items:center;gap:8px;margin-top:6px; }
.progress-track { flex:1;height:6px;background:var(--gray-200);border-radius:99px;overflow:hidden; }
.progress-fill { height:100%;border-radius:99px;transition:width .5s; }
.progress-pct { font-size:11px;font-weight:700;color:var(--gray-600);min-width:30px; }
.lock-reason { font-size:11px;color:var(--gray-400);font-weight:600;margin-top:4px; }
.sc-chevron { font-size:12px;flex-shrink:0; }
.sc-badge { font-size:12px;flex-shrink:0; }

/* Activity list (inside scenario) */
.activity-list { border-top:1px solid var(--gray-200);padding:8px 0;animation:fadeUp .2s ease both; }
.act-row { width:100%;display:flex;align-items:center;gap:12px;padding:12px 16px;text-align:left;transition:background .1s;cursor:pointer;background:none;border:none; }
.act-row:active { background:var(--gray-100); }
.act-row.done { background:var(--green-light); }
.act-icon { font-size:20px;flex-shrink:0; }
.act-name { flex:1;font-size:14px;font-weight:700;color:var(--gray-800); }
.act-row.done .act-name { color:var(--green-dark); }
.act-result { font-size:16px;min-width:40px;text-align:right; }

/* ── ACTIVITY VIEW ────────────────────────────────────────────── */
#view-activity { background:var(--gray-50); }
.act-header { background:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:var(--ssm);border-bottom:1px solid var(--gray-200);flex-shrink:0; }
.btn-back-act { color:var(--accent);font-size:14px;font-weight:700;padding:6px 0; }
.act-header-info { display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800; }
.act-body { flex:1;padding:20px 16px 32px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;animation:fadeUp .3s ease both; }
.context-tag { display:inline-block;padding:5px 14px;border-radius:99px;font-size:13px;font-weight:700;color:#fff;margin-bottom:4px; }
.outcome-card { background:#fff;border-radius:var(--rlg);padding:18px;box-shadow:var(--ssm);border-left:4px solid var(--accent); }
.outcome-label { font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);margin-bottom:8px; }
.outcome-text { font-size:15px;font-weight:600;color:var(--gray-800);line-height:1.5; }
.prev-result { background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--rmd);padding:12px 16px;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:600;color:#92400E; }

/* Activity engine */
.act-lang-banner { background:#EEF2FF;border:1.5px solid #C7D2FE;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;color:#3730A3;display:flex;align-items:center;gap:8px; }
.act-intro { padding:14px;background:var(--gray-100);border-radius:var(--rmd);font-size:14px;color:var(--gray-600);font-weight:600;line-height:1.5; }
.act-text-block { background:#fff;border-radius:var(--rmd);padding:18px;font-size:15px;line-height:1.75;border:1px solid var(--gray-200); }
.act-question { margin-bottom:18px; }
.act-question-text { font-size:14px;font-weight:800;color:var(--gray-700);margin-bottom:10px;line-height:1.4; }
.act-options { display:flex;flex-direction:column;gap:8px; }
.act-option { padding:12px 14px;border-radius:10px;border:2px solid var(--gray-200);font-size:14px;font-weight:600;text-align:left;background:#fff;transition:all .15s;cursor:pointer; }
.act-option:active { transform:scale(.98); }
.act-option.selected { border-color:var(--accent);background:#EEF2FF;color:var(--accent-dark); }
.act-option.correct { border-color:var(--green);background:var(--green-light);color:var(--green-dark); }
.act-option.wrong { border-color:var(--red);background:var(--red-light);color:var(--red); }
.act-listen-btn { display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;border-radius:var(--rmd);font-size:15px;font-weight:800;width:100%;margin-bottom:14px;cursor:pointer;border:none;color:#fff;background:var(--accent); }
.act-listen-btn.playing { background:var(--green); }
.act-submit-row { margin-top:20px; }
.act-score-box { background:var(--gray-100);border-radius:var(--rmd);padding:16px;text-align:center;margin-top:20px; }
.act-score-label { font-size:12px;font-weight:700;color:var(--gray-400);text-transform:uppercase;margin-bottom:4px; }
.act-score-val { font-family:var(--fd);font-size:36px;font-weight:900;color:var(--accent-dark); }
.act-feedback { font-size:13px;font-weight:600;margin-top:6px; }

/* Speaking */
.speak-task { background:#FEF3C7;border:2px solid #F59E0B;border-radius:var(--rmd);padding:14px;margin-bottom:14px; }
.speak-task-label { font-size:11px;font-weight:800;color:#92400E;text-transform:uppercase;margin-bottom:6px; }
.speak-task-text { font-size:15px;font-weight:700;color:#78350F;line-height:1.5; }
.speak-model { background:var(--green-light);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--green-dark);font-weight:600; }
.speak-record-btn { background:var(--red);color:#fff;padding:14px;border-radius:var(--rmd);font-size:15px;font-weight:800;width:100%;margin-bottom:12px;border:none;cursor:pointer; }
.speak-record-btn.recording { background:#7C3AED;animation:pulse 1s infinite; }
.speak-record-btn.done { background:var(--green); }
.self-eval-title { font-size:13px;font-weight:800;color:var(--gray-600);margin-bottom:10px;text-transform:uppercase; }
.self-eval-item { display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100); }
.self-eval-item:last-child { border-bottom:none; }
.self-eval-text { flex:1;font-size:13px;font-weight:600;color:var(--gray-700); }
.self-eval-btns { display:flex;gap:6px; }
.self-eval-btn { padding:6px 14px;border-radius:99px;font-size:13px;font-weight:800;border:2px solid var(--gray-200);cursor:pointer;background:none; }
.self-eval-btn.yes { border-color:var(--green);background:var(--green-light);color:var(--green-dark); }
.self-eval-btn.no { border-color:var(--red);background:var(--red-light);color:var(--red); }

/* Writing */
.write-area { width:100%;min-height:110px;border:2px solid var(--gray-200);border-radius:var(--rmd);padding:12px;font-size:14px;font-family:inherit;resize:vertical;line-height:1.6; }
.write-area:focus { outline:none;border-color:var(--accent); }
.write-prompt { background:#FEF3C7;border-left:4px solid #F59E0B;padding:12px 14px;border-radius:0 8px 8px 0;margin-bottom:12px;font-size:14px;font-weight:600;color:#78350F;line-height:1.5; }
.write-checklist { margin-bottom:14px; }
.checklist-item { display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:13px;font-weight:600;color:var(--gray-700); }
.checklist-cb { width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex-shrink:0; }

/* Mediation */
.med-situation { background:#F0FDF4;border:2px solid #86EFAC;border-radius:var(--rmd);padding:14px;margin-bottom:14px; }
.med-situation-label { font-size:11px;font-weight:800;color:#166534;text-transform:uppercase;margin-bottom:6px; }
.med-situation-text { font-size:14px;font-weight:600;color:#15803D;line-height:1.5; }

/* Result */
.result-section { background:#fff;border-radius:var(--rlg);padding:32px 20px;box-shadow:var(--smd);display:flex;flex-direction:column;align-items:center;gap:12px;animation:pop .4s ease both;text-align:center;margin-top:16px; }
.result-stars-big { font-size:48px; }
.result-score { font-family:var(--fd);font-size:40px;font-weight:800;color:var(--accent); }
.result-msg { font-size:18px;font-weight:700;line-height:1.4; }

/* Progress dots */
.progress-dots { display:flex;gap:6px;justify-content:center;margin-bottom:16px; }
.dot { width:8px;height:8px;border-radius:50%;background:var(--gray-200); }
.dot.active { background:var(--accent); }
.dot.done { background:var(--green); }

/* ── UNLOCK VIEW ──────────────────────────────────────────────── */
#view-unlock { align-items:center;justify-content:center;padding:24px;background:linear-gradient(145deg,#FEF9C3,#D1FAE5,#DBEAFE); }
.unlock-card { background:#fff;border-radius:var(--rxl);padding:40px 28px;box-shadow:var(--slg);text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;animation:pop .5s ease both;max-width:360px;width:100%; }
.unlock-emoji { font-size:64px;animation:bounce .8s infinite alternate; }
.unlock-title { font-family:var(--fd);font-size:26px;font-weight:800; }
.unlock-sc-name { font-family:var(--fd);font-size:20px;font-weight:800;color:var(--accent); }
.unlock-msg { font-size:15px;color:var(--gray-600);font-weight:600;line-height:1.5; }

/* ── BUTTONS ──────────────────────────────────────────────────── */
.btn-primary { width:100%;padding:17px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-radius:var(--rmd);font-size:17px;font-weight:800;box-shadow:0 4px 12px rgba(79,70,229,.35);transition:transform .15s;text-align:center;border:none;cursor:pointer; }
.btn-primary:active { transform:scale(.97); }
.btn-primary:disabled { opacity:.6;cursor:not-allowed; }
.btn-secondary { width:100%;padding:14px;background:var(--gray-100);color:var(--gray-800);border-radius:var(--rmd);font-size:15px;font-weight:700;text-align:center;border:none;cursor:pointer;transition:background .15s; }
.btn-secondary:active { background:var(--gray-200); }

/* ── ERROR BOX ────────────────────────────────────────────────── */
.error-box { background:var(--red-light);border:1px solid #FECACA;color:var(--red);border-radius:var(--rsm);padding:10px 14px;font-size:14px;font-weight:600;display:none;margin-bottom:10px; }
.error-box.show { display:block; }

/* ── LANG TOGGLE ──────────────────────────────────────────────── */
.lang-toggle { display:flex;align-items:center;gap:0;background:rgba(255,255,255,.2);border-radius:20px;padding:2px;flex-shrink:0; }
.lang-btn { padding:4px 10px;border-radius:18px;font-size:12px;font-weight:800;color:rgba(255,255,255,.7);cursor:pointer;border:none;background:none;transition:all .2s; }
.lang-btn.active { background:#fff;color:var(--accent-dark); }

/* ── STUDY MODE VIEW ──────────────────────────────────────────── */
#view-study { background:var(--gray-50); }
.study-header { padding:16px 20px;display:flex;align-items:center;gap:12px;box-shadow:var(--smd);flex-shrink:0; }
.study-body { flex:1;padding:20px 16px 36px;overflow-y:auto;display:flex;flex-direction:column;gap:20px; }
.study-section-title { font-family:var(--fd);font-size:16px;font-weight:800;color:var(--gray-800);margin-bottom:10px;display:flex;align-items:center;gap:8px; }

/* Flashcards */
.flashcard-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:10px; }
.flashcard { border-radius:var(--rmd);min-height:90px;cursor:pointer;perspective:600px;position:relative; }
.flashcard-inner { width:100%;height:100%;transform-style:preserve-3d;transition:transform .4s;position:relative;min-height:90px; }
.flashcard.flipped .flashcard-inner { transform:rotateY(180deg); }
.flashcard-front,.flashcard-back { position:absolute;inset:0;border-radius:var(--rmd);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;backface-visibility:hidden;-webkit-backface-visibility:hidden; }
.flashcard-front { background:#fff;border:2px solid var(--gray-200); }
.flashcard-back { background:var(--accent);color:#fff;transform:rotateY(180deg); }
.fc-word { font-size:15px;font-weight:800;text-align:center;line-height:1.3; }
.fc-hint { font-size:11px;color:var(--gray-400);margin-top:4px; }
.fc-translation { font-size:14px;font-weight:700;text-align:center; }
.fc-tap { font-size:10px;opacity:.7;margin-top:4px; }

/* Grammar chips */
.grammar-chips { display:flex;flex-wrap:wrap;gap:8px; }
.grammar-chip { background:#EEF2FF;border-radius:99px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--accent-dark);display:flex;align-items:center;gap:6px;cursor:pointer;transition:background .15s; }
.grammar-chip:active { background:#C7D2FE; }

/* Pronunciation row */
.pronunc-row { display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-radius:var(--rmd);border:1px solid var(--gray-200); }
.pronunc-word { font-size:15px;font-weight:800;flex:1; }
.pronunc-ipa { font-size:12px;color:var(--gray-400);font-weight:600; }
.pronunc-btn { background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer; }

/* Study CTA */
.study-cta { background:linear-gradient(135deg,var(--accent),var(--accent-dark));border-radius:var(--rlg);padding:20px;text-align:center;color:#fff; }
.study-cta-title { font-family:var(--fd);font-size:20px;font-weight:800;margin-bottom:6px; }
.study-cta-sub { font-size:13px;opacity:.85;margin-bottom:16px; }

/* ── SAFE AREA ────────────────────────────────────────────────── */
@supports(padding:env(safe-area-inset-bottom)) { .view { padding-bottom:env(safe-area-inset-bottom); } }

/* ── MASCOT ORBIT ─────────────────────────────────────────────── */
#orbit-container { position:fixed;top:12px;right:12px;z-index:9998;pointer-events:none;display:flex;flex-direction:column;align-items:center; }
#orbit-svg { width:68px;height:68px;animation:orbitFloat 4s ease-in-out infinite; }
#orbit-bubble { background:#fff;border-radius:12px;padding:6px 10px;font-size:12px;box-shadow:var(--smd);margin-bottom:6px;opacity:0;transition:opacity .25s;max-width:130px;text-align:center;font-weight:700; }
#orbit-bubble.show { opacity:1; }

/* ── STATE ────────────────────────────────────────────────────── */

/* ── LOCALSTORAGE ─────────────────────────────────────────────── */
const LS_KEY = 'sb_progress_v2'
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {} } catch { return {} }
}
function saveProgress() {
  localStorage.setItem(LS_KEY, JSON.stringify(state.progress))
}
function getActKey(gradeId, scIdx, skillIdx) {
  return `${gradeId}_${scIdx}_${skillIdx}`
}
function getActProgress(gradeId, scIdx, skillIdx) {
  return state.progress[gradeId]?.[getActKey(gradeId,scIdx,skillIdx)] || null
}
function setActProgress(gradeId, scIdx, skillIdx, score, stars) {
  if (!state.progress[gradeId]) state.progress[gradeId] = {}
  state.progress[gradeId][getActKey(gradeId,scIdx,skillIdx)] = { score, stars, done: true, ts: Date.now() }
  saveProgress()
}

/* ── UTILITIES ────────────────────────────────────────────────── */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
  document.getElementById('view-'+id).classList.add('active')

function showLoading(txt='Loading…', icon='🌟') {
  document.getElementById('loading-text').textContent = txt
  document.getElementById('loader-icon').textContent = icon
  document.getElementById('loading-overlay').classList.add('show')
}
function hideLoading() { document.getElementById('loading-overlay').classList.remove('show') }

function scoreToStars(pct) {
  if (pct >= 90) return 3
  if (pct >= 70) return 2
  if (pct >= 40) return 1
  return 0
}
function starsStr(n) { return n > 0 ? '⭐'.repeat(n) : '—' }
function calcPct(c, t) { return t ? Math.round(c/t*100) : 0 }

/* ── GRADE CARD RENDERING ─────────────────────────────────────── */
function renderGradeCards() {
  const groups = { early: [], elementary: [], secondary: [] }
  GRADES.forEach(g => groups[g.group].push(g))

  renderGrid('grid-early', groups.early)
  renderGrid('grid-elementary', groups.elementary)
  renderGrid('grid-secondary', groups.secondary)
}

function renderGrid(containerId, grades) {
  const el = document.getElementById(containerId)
  el.innerHTML = grades.map(g => {
    const progress = state.progress[g.id] || {}
    const total = Object.keys(progress).length
    return `<button class="grade-card" 
      style="background:${g.colorLight};color:${g.color2}" 
      onclick="selectGrade('${g.id}')">
      <div class="gc-emoji">${g.emoji}</div>
      <div class="gc-grade" style="color:${g.color2}">${g.label}</div>
      <div class="gc-level">${g.cefr}</div>
      <div class="gc-scenarios">${g.desc}</div>
      ${total > 0 ? `<div style="margin-top:5px;font-size:11px;font-weight:700;color:${g.color1}">✓ ${total} ${t('activitiesDone')}</div>` : ''}
    </button>`
  }).join('')
}

/* ── GRADE SELECTION ──────────────────────────────────────────── */
async function selectGrade(gradeId) {
  const g = GRADES.find(x => x.id === gradeId)
  if (!g) return
  state.currentGrade = g
  showLoading(`Loading ${g.label}…`, g.emoji)

  try {
    const res = await fetch(g.file)
    const raw = await res.json()
    state.gradeData = raw
    state.scenarios = processScenarios(raw, g)
    state.openScenarioIdx = null
    renderGradeView()
  } catch(e) {
    console.error(e)
    alert('Could not load content for ' + g.label + '. Make sure the JSON files are in the same folder.')
  }
  hideLoading()
}

/* ── JSON NORMALIZATION ───────────────────────────────────────── */
function processScenarios(raw, grade) {
  let scenarios = Array.isArray(raw) ? raw : (raw.scenarios || [])
  return scenarios.map((sc, idx) => {
    const title = sc.title || sc.scenario_name || sc.scenario || `Scenario ${idx+1}`
    const themes = sc.themes || []
    const themeTitles = Array.isArray(themes) ? themes.map(t => typeof t==='string' ? t : t.title || '') : []

    // Skills
    const skills = SKILL_NAMES.map((skill, si) => {
      const prog = getActProgress(grade.id, idx, si)
      return {
        name: skill,
        icon: SKILL_ICONS[skill],
        progress: prog,
        learningOutcome: extractOutcome(sc, skill)
      }
    })

    // Completion
    const done = skills.filter(s => s.progress?.done).length
    const avgScore = skills.filter(s => s.progress?.done).reduce((a,s) => a+s.progress.score,0) / (done||1)

    // Unlock logic: first always available, rest need 70%+ on previous
    const prevDone = idx === 0 ? true : (() => {
      const prev = state.scenarios?.[idx-1]
      if (!prev) return true
      return prev.skills.filter(s=>s.progress?.done).length >= 3 &&
             prev.skills.filter(s=>s.progress?.done).reduce((a,s)=>a+s.progress.score,0) / (prev.skills.filter(s=>s.progress?.done).length||1) >= 70
    })()

    return { idx, title, themes: themeTitles, skills, done, avgScore, available: prevDone }
  })
}

function extractOutcome(sc, skill) {
  const lo = sc.standards_and_learning_outcomes
  if (!lo) return `Practice your ${skill} skills.`
  const s = lo[skill.toLowerCase()]
  if (!s) return `Practice your ${skill} skills.`
  if (typeof s === 'string') return s
  if (s.general) return s.general
  if (s.learning_outcomes?.length) return s.learning_outcomes[0]
  if (s.specific?.length) return s.specific[0]
  if (s.receptive) return s.receptive
  if (Array.isArray(s)) return s[0]
  return JSON.stringify(s).substring(0,120)
}

          ${available ? `
            <div class="sc-progress-row">
              <div class="progress-track">
                <div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${g.color1},${g.color2})"></div>
              </div>
              <span class="progress-pct">${pct}%</span>
            </div>
          ` : `<div class="lock-reason">${t('lockReason')}</div>`}
        </div>
        ${available ? `<span class="sc-badge">${sc.done>0?starsStr(scoreToStars(sc.avgScore)):''}</span>` : ''}
        ${available ? `<span class="sc-chevron" style="color:${g.color1}">${isOpen?'▲':'▼'}</span>` : ''}

/* ── ACTIVITY ─────────────────────────────────────────────────── */
function openActivity(scIdx, skillIdx) {
  const sc = state.scenarios[scIdx]
  const skill = sc.skills[skillIdx]
  state.selectedScenario = { sc, scIdx }
  state.selectedActivity = { skill, skillIdx }

  document.getElementById('act-skill-icon').textContent = skill.icon
  document.getElementById('act-skill-name').textContent = skill.name

  const body = document.getElementById('act-body')
  body.innerHTML = ''

  // Context tag
  const tag = document.createElement('div')
  tag.innerHTML = `<span class="context-tag" style="background:${state.currentGrade.color1}">${sc.title}</span>`
  body.appendChild(tag)

  // Previous result
  if (skill.progress?.done) {
    const prev = document.createElement('div')
    prev.className = 'prev-result'
    prev.innerHTML = `<span>${t('prevResult')}</span><span>${starsStr(skill.progress.stars)}</span><span>${Math.round(skill.progress.score)}%</span>`
    body.appendChild(prev)
  }

  // Outcome
  const out = document.createElement('div')
  out.className = 'outcome-card'
  out.innerHTML = `<div class="outcome-label">${t('learningObj')}</div><div class="outcome-text">${skill.learningOutcome}</div>`
  body.appendChild(out)

  // Try to render real content from embedded database
  const contentKey = buildContentKey(state.currentGrade.id, scIdx, skillIdx)
  const content = ACTIVITY_CONTENT[contentKey]

  if (content) {
    renderActivityContent(content, skill.name, body)
  } else {
    renderSliderFallback(skill, scIdx, skillIdx, body)
  }

  showView('activity')
}

function buildContentKey(gradeId, scIdx, skillIdx) {
  // Map grade id → short prefix
  const gradeMap = { 'pre-k':'prek', 'kinder':'k', '1':'g1','2':'g2','3':'g3','4':'g4','5':'g5','6':'g6','7':'g7','8':'g8','9':'g9','10':'g10','11':'g11','12':'g12' }
  const skillMap = { 0:'listening',1:'reading',2:'speaking',3:'writing',4:'mediation' }
  const gPrefix = gradeMap[gradeId] || gradeId
  const theme = skillIdx < 5 ? 1 : 2
  const actualSkillIdx = skillIdx % 5
  return `${gPrefix}_s${scIdx+1}_t${theme}_${skillMap[actualSkillIdx]}`
}

/* ── ACTIVITY CONTENT ENGINE ─────────────────────────────────── */
function renderActivityContent(content, skillName, body) {
  const { scIdx, skillIdx } = state.selectedActivity
  const scIdxRef = state.selectedScenario.scIdx

  if (content.type === 'listening') renderListening(content, body, scIdxRef, skillIdx)
  else if (content.type === 'reading') renderReading(content, body, scIdxRef, skillIdx)
  else if (content.type === 'speaking') renderSpeaking(content, body, scIdxRef, skillIdx)
  else if (content.type === 'writing') renderWriting(content, body, scIdxRef, skillIdx)
  else if (content.type === 'mediation') renderMediation(content, body, scIdxRef, skillIdx)
}

function showResult(score, body, scIdx, skillIdx) {
  const stars = scoreToStars(score)
  setActProgress(state.currentGrade.id, scIdx, skillIdx, score, stars)
  state.scenarios = processScenarios(state.gradeData, state.currentGrade)

  const msgs = ['', t('keepTrying'), t('goodEffort'), t('wellDone'), t('excellent')]
  const res = document.createElement('div')
  res.className = 'result-section'
  res.innerHTML = `
    <div class="result-stars-big">${stars>0?starsStr(stars):'😊'}</div>
    <div class="result-score" style="color:${state.currentGrade.color1}">${Math.round(score)}%</div>
    <div class="result-msg">${msgs[stars] || ''}</div>
    <button class="btn-primary" style="background:linear-gradient(135deg,${state.currentGrade.color1},${state.currentGrade.color2});margin-top:8px" onclick="afterResult()">${t('backScenarios')}</button>`
  body.appendChild(res)
  res.scrollIntoView({ behavior:'smooth', block:'center' })
  orbitCelebrate(score, stars)
}

function afterResult() {
  state.scenarios = processScenarios(state.gradeData, state.currentGrade)
  renderScenarioList()
  showView('grade')
}

function refreshAfterSubmit(score, stars, scIdx, skillIdx) {
  state.scenarios = processScenarios(state.gradeData, state.currentGrade)

/* ── LISTENING ACTIVITY ───────────────────────────────────────── */
function renderListening(c, body, scIdx, skillIdx) {
  const answers = new Array(c.questions.length).fill(null)
  let submitted = false

  const div = document.createElement('div')
  div.innerHTML = `
    <div class="act-lang-banner">${t('listenInstr')}</div>
    <div id="lq-container"></div>
    <div class="act-submit-row">
      <div class="error-box" id="l-err"></div>
      <button class="btn-primary" id="l-submit" style="background:linear-gradient(135deg,${state.currentGrade.color1},${state.currentGrade.color2})">${t('checkAnswers')}</button>
    </div>`
  body.appendChild(div)

  function renderQs() {
    document.getElementById('lq-container').innerHTML = c.questions.map((q,i) => `
      <div class="act-question">
        <button class="act-listen-btn" onclick="speakSentence(${i})" id="play-btn-${i}">
          🔊 ${t('listenSentence')} ${i+1}
        </button>
        <div class="act-question-text">${i+1}. ${q.q}</div>
        <div class="act-options">
          ${q.opts.map((o,j)=>`<button class="act-option ${answers[i]===j?'selected':''}" onclick="pickListen(${i},${j})">${o}</button>`).join('')}
        </div>
      </div>`).join('')

    window._listenSentences = c.sentences
    window.speakSentence = (i) => {
      const btn = document.getElementById('play-btn-'+i)
      if (btn) { btn.classList.add('playing'); btn.textContent='🔊 Playing…' }
      speakText(c.sentences[i], () => {
        if (btn) { btn.classList.remove('playing'); btn.textContent=`🔊 Listen again (${i+1})` }
      })
    }
    window.pickListen = (qi, oi) => {
      if (submitted) return
      answers[qi] = oi
      renderQs()
    }
  }
  renderQs()

  document.getElementById('l-submit').addEventListener('click', () => {
    if (answers.includes(null)) {
      const e=document.getElementById('l-err'); e.textContent=t('answerAll'); e.classList.add('show'); return
    }
    submitted = true
    // Show correct/wrong
    document.querySelectorAll('#lq-container .act-question').forEach((qEl, i) => {
      qEl.querySelectorAll('.act-option').forEach((btn, j) => {
        btn.classList.remove('selected')
        if (j === c.questions[i].ans) btn.classList.add('correct')
        else if (j === answers[i] && answers[i] !== c.questions[i].ans) btn.classList.add('wrong')
        btn.onclick = null
      })
    })
    document.getElementById('l-submit').style.display='none'
    const correct = answers.filter((a,i)=>a===c.questions[i].ans).length
    const score = Math.round(correct/c.questions.length*100)
    showResult(score, body, scIdx, skillIdx)
  })
}

/* ── SPEAKING ACTIVITY ────────────────────────────────────────── */
function renderSpeaking(c, body, scIdx, skillIdx) {
  let taskIdx = 0
  const selfEval = new Array(c.criteria.length).fill(null)
  let recorded = false

  const container = document.createElement('div')
  container.id = 'speak-container'
  body.appendChild(container)

  function renderTask() {
    const tk = c.tasks[taskIdx]
    container.innerHTML = `
      <div class="act-lang-banner">${t('speakInstr')}</div>
      <div class="progress-dots">
        ${c.tasks.map((_,i)=>`<div class="dot ${i<taskIdx?'done':i===taskIdx?'active':''}"></div>`).join('')}
      </div>
      <div class="speak-task">
        <div class="speak-task-label">${t('task')} ${taskIdx+1} ${t('of')} ${c.tasks.length}</div>
        <div style="font-size:36px;text-align:center;margin:8px 0">${tk.img}</div>
        <div class="speak-task-text">${tk.prompt}</div>
      </div>
      <div class="speak-model">💡 <em>"${tk.model}"</em></div>
      <button class="act-listen-btn" onclick="speakText('${tk.model.replace(/'/g,"\\'")}')" style="background:${state.currentGrade.color1}">${t('hearModel')}</button>
      <button class="speak-record-btn" id="rec-btn" onclick="handleRecord()">${t('tapRecord')}</button>
      <div id="rec-status" style="text-align:center;font-size:13px;color:var(--gray-400);margin-bottom:12px"></div>
      ${taskIdx===c.tasks.length-1&&recorded ? renderSelfEvalHtml(c.criteria,selfEval) : ''}
      <button class="btn-secondary" id="btn-next-task" style="display:${recorded?'block':'none'}" onclick="nextTask()">
        ${taskIdx<c.tasks.length-1?t('nextTask'):t('finishEval')}
      </button>`

    window.handleRecord = () => {
      const btn=document.getElementById('rec-btn'), st=document.getElementById('rec-status')
      if(btn.classList.contains('recording')) {
        btn.classList.remove('recording'); btn.classList.add('done')
        btn.textContent=t('recorded'); st.textContent=t('greatJob')
        recorded=true
        document.getElementById('btn-next-task').style.display='block'
      } else {
        if(btn.classList.contains('done')){ btn.classList.remove('done') }
        btn.classList.add('recording'); btn.textContent=t('tapStop'); st.textContent=t('recordStatus')
      }
    }

    window.nextTask = () => {
      if (taskIdx < c.tasks.length-1) { taskIdx++; recorded=false; renderTask() }
      else {
        // show self eval at the end
        const evalContainer = document.createElement('div')
        evalContainer.innerHTML = renderSelfEvalHtml(c.criteria, selfEval)
        container.appendChild(evalContainer)
        evalContainer.querySelectorAll('.self-eval-btn').forEach(b => {
          b.addEventListener('click', () => {
            const i=+b.dataset.idx, v=b.dataset.val==='1'
            selfEval[i]=v; renderSelfEvalBtns(evalContainer,c.criteria,selfEval)
          })
        })
        evalContainer.querySelector('#btn-eval-submit')?.addEventListener('click', submitEval)
        document.getElementById('btn-next-task').style.display='none'
      }
    }

    if (taskIdx===c.tasks.length-1&&recorded) {
      bindSelfEval(container, c.criteria, selfEval)
    }
  }

  function renderSelfEvalHtml(criteria, vals) {
    return `<div style="margin-top:16px">
      <div class="self-eval-title">${t('howDidYou')}</div>
      ${criteria.map((cr,i)=>`
        <div class="self-eval-item">
          <div class="self-eval-text">${cr}</div>
          <div class="self-eval-btns">
            <button class="self-eval-btn ${vals[i]===true?'yes':''}" data-idx="${i}" data-val="1">${t('yesBtn')}</button>
            <button class="self-eval-btn ${vals[i]===false?'no':''}" data-idx="${i}" data-val="0">${t('noBtn')}</button>
          </div>
        </div>`).join('')}
      <div class="error-box" id="eval-err"></div>
      <button class="btn-primary" id="btn-eval-submit" style="margin-top:14px;background:linear-gradient(135deg,${state.currentGrade.color1},${state.currentGrade.color2})">${t('submitEval')}</button>
    </div>`
  }

  function renderSelfEvalBtns(container, criteria, vals) {
    criteria.forEach((_,i) => {
      container.querySelectorAll('.self-eval-btn').forEach(b => {
        if (+b.dataset.idx===i) {
          b.classList.remove('yes','no')
          if (vals[i]===true && b.dataset.val==='1') b.classList.add('yes')
          if (vals[i]===false && b.dataset.val==='0') b.classList.add('no')
        }
      })
    })
  }

  function bindSelfEval(el, criteria, vals) {
    el.querySelectorAll('.self-eval-btn').forEach(b => {
      b.addEventListener('click', () => {
        vals[+b.dataset.idx] = b.dataset.val==='1'
        renderSelfEvalBtns(el,criteria,vals)
      })
    })
    el.querySelector('#btn-eval-submit')?.addEventListener('click', submitEval)
  }

  function submitEval() {
    if (selfEval.includes(null)) {
      const e=document.getElementById('eval-err'); if(e){e.textContent=t('evalAll');e.classList.add('show')} return
    }
    const yes=selfEval.filter(v=>v===true).length
    showResult(Math.round(yes/c.criteria.length*100), body, scIdx, skillIdx)
  }

  renderTask()
}

/* ── WEB SPEECH API ───────────────────────────────────────────── */
function speakText(text, onEnd) {
  if (!('speechSynthesis' in window)) { alert('Your browser does not support text-to-speech. Try Chrome or Edge.'); return }
  window.speechSynthesis.cancel()
  const utt = new SpeechSynthesisUtterance(typeof text==='string' ? text : text.dataset?.text || '')
  utt.lang = 'en-US'
  utt.rate = 0.85
  utt.pitch = 1.0
  if (onEnd) utt.onend = onEnd
  window.speechSynthesis.speak(utt)
}

/* ── STUDY MODE ENGINE ────────────────────────────────────────── */
function openStudyMode(scIdx) {
  const sc = state.scenarios[scIdx]
  const g = state.currentGrade
  state.openScenarioIdx = scIdx

  // Build header
  document.getElementById('study-scenario-title').textContent = sc.title
  document.getElementById('study-header').style.background = `linear-gradient(135deg,${g.color1},${g.color2})`
  document.getElementById('study-header-emoji').textContent = g.emoji

  // Build body from JSON data
  const raw = state.gradeData
  const scenarios = Array.isArray(raw) ? raw : (raw.scenarios || [])
  const scRaw = scenarios[scIdx]

  const body = document.getElementById('study-body')
  body.innerHTML = ''

  // ── VOCABULARY ────────────────────────────────────────
  const vocab = extractVocab(scRaw)
  if (vocab.length) {
    const sec = document.createElement('div')
    sec.innerHTML = `<div class="study-section-title">${t('vocabulary')}</div>
      <div class="flashcard-grid" id="fc-grid"></div>`
    body.appendChild(sec)

    const grid = sec.querySelector('#fc-grid')
    vocab.slice(0,12).forEach((w, i) => {
      const card = document.createElement('div')
      card.className = 'flashcard'
      card.innerHTML = `<div class="flashcard-inner">
        <div class="flashcard-front">
          <div class="fc-word">${w.word}</div>
          <div class="fc-hint" style="color:${g.color1}">${t('tapFlip')}</div>
        </div>
        <div class="flashcard-back" style="background:linear-gradient(135deg,${g.color1},${g.color2})">
          <div class="fc-translation">${w.es || '—'}</div>
          <button class="pronunc-btn" style="margin-top:8px;background:rgba(255,255,255,.3)" onclick="event.stopPropagation();speakText('${w.word.replace(/'/g,"\\'")}')">🔊</button>
        </div>
      </div>`
      card.addEventListener('click', () => card.classList.toggle('flipped'))
      grid.appendChild(card)
    })
  }

  // ── GRAMMAR STRUCTURES ────────────────────────────────
  const grammar = extractGrammar(scRaw)
  if (grammar.length) {
    const sec = document.createElement('div')
    sec.innerHTML = `<div class="study-section-title">${t('grammar')}</div>
      <div class="grammar-chips">${grammar.map(g =>
        `<div class="grammar-chip" onclick="speakText('${g.replace(/'/g,"\\'")}')">${g} 🔊</div>`
      ).join('')}</div>`
    body.appendChild(sec)
  }

  // ── PRONUNCIATION FOCUS ───────────────────────────────
  const pronunc = extractPronunc(scRaw)
  if (pronunc.length) {
    const sec = document.createElement('div')
    sec.innerHTML = `<div class="study-section-title">${t('pronunciation')}</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${pronunc.slice(0,6).map(p => `
          <div class="pronunc-row">
            <div class="pronunc-word">${p}</div>
            <button class="pronunc-btn" style="background:${g.color1}" onclick="speakText('${p.replace(/'/g,"\\'")}')">🔊</button>
          </div>`).join('')}
      </div>`
    body.appendChild(sec)
  }

  // ── CTA ───────────────────────────────────────────────
  const cta = document.createElement('div')
  cta.className = 'study-cta'
  cta.style.background = `linear-gradient(135deg,${g.color1},${g.color2})`
  cta.innerHTML = `
    <div class="study-cta-title">${t('ctaTitle')}</div>
    <div class="study-cta-sub">${t('ctaSub')}</div>
    <button class="btn-primary" style="background:rgba(255,255,255,.25);backdrop-filter:blur(4px)" onclick="backFromStudy()">
      ${t('goToActivities')}
    </button>`
  body.appendChild(cta)

  showView('study')
}

function backFromStudy() {
  renderScenarioList()
  showView('grade')
}

/* Vocabulary extractor — handles multiple JSON formats */
function extractVocab(sc) {
  const cc = sc?.communicative_competences
  const vocab = cc?.linguistic?.vocabulary || cc?.Linguistic?.vocabulary || []
  if (Array.isArray(vocab) && typeof vocab[0] === 'string') {
    return vocab.slice(0,12).map(w => ({ word: w, es: '' }))
  }
  if (Array.isArray(vocab) && typeof vocab[0] === 'object') {
    return vocab.slice(0,12).map(v => ({ word: v.word || v.term || '', es: v.translation || v.traduccion || '' }))
  }
  // Try scope_sequence fallback — just return empty, handled by themes
  return []
}

/* Grammar extractor */
function extractGrammar(sc) {
  const cc = sc?.communicative_competences
  const g = cc?.linguistic?.grammar || cc?.Linguistic?.grammar || []
  if (Array.isArray(g)) return g.slice(0,8).map(s => typeof s === 'string' ? s : '')
  return []
}

/* Pronunciation extractor */
function extractPronunc(sc) {
  const cc = sc?.communicative_competences
  const p = cc?.linguistic?.pronunciation || cc?.Linguistic?.pronunciation || []
  if (Array.isArray(p)) return p.slice(0,6).map(s => {
    // Extract the word from strings like "/p/ in 'pencil', /b/ in 'book'"
    const match = s.match(/'([^']+)'/g)
    return match ? match[0].replace(/'/g,'') : s.split(',')[0].replace(/^.*\/\s*/,'').trim()
  }).filter(Boolean)
  return []
}

  perfect: [
    'Perfect score! 🎉 / ¡Puntaje perfecto!',
    'Amazing! 🌟 / ¡Increíble!',
    'You nailed it! ✨ / ¡Lo lograste!'
  ],

  ],
  ok: [

    'Almost there! 🎯 / ¡Casi lo logras!',
    'Try again soon! 💡 / ¡Vuelve a intentarlo!'
  ],
}

function orbitCelebrate(score, stars) {
  const msgs = score >= 95 ? ORBIT_MSGS.perfect : stars >= 2 ? ORBIT_MSGS.good : ORBIT_MSGS.ok
  const msg = msgs[Math.floor(Math.random() * msgs.length)]
  const bubble = document.getElementById('orbit-bubble')
  bubble.textContent = msg
  bubble.classList.add('show')
  setTimeout(() => bubble.classList.remove('show'), 3000)
}

function orbitSay(msgEN, msgES) {
  const bubble = document.getElementById('orbit-bubble')
  bubble.textContent = `${msgEN} / ${msgES}`
  bubble.classList.add('show')
  setTimeout(() => bubble.classList.remove('show'), 2500)
}

/* ── UNLOCK VIEW i18n ─────────────────────────────────────────── */
function updateUnlockView() {
  const title = document.querySelector('.unlock-title')
  const msg   = document.querySelector('.unlock-msg')
  const btn   = document.getElementById('btn-unlock-continue')
  if (title) title.textContent = t('unlockTitle')
  if (msg)   msg.textContent   = t('unlockMsg')
  if (btn)   btn.textContent   = t('letsGo')
}

/* ── INIT ─────────────────────────────────────────────────────── */
async function init() {
  state.progress = loadProgress()

  // Restore saved language preference
  const savedLang = localStorage.getItem('sb_lang') || 'en'
  LANG = savedLang
  document.getElementById('btn-lang-en').classList.toggle('active', savedLang === 'en')
  document.getElementById('btn-lang-es').classList.toggle('active', savedLang === 'es')
  // Apply to any data-i elements visible at startup
  document.querySelectorAll('[data-i]').forEach(el => {
    const key = el.dataset.i
    if (I18N[LANG][key]) el.textContent = I18N[LANG][key]
  })
  updateUnlockView()

  renderGradeCards()
  setTimeout(() => {
    showView('home')
    orbitSay('Hello! 👋', '¡Hola!')
  }, 1400)
}
init()
